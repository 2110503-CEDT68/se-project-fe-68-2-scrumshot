version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venue-explorer-frontend
    ports:
      - "3000:3000"
    environment:
      # NextAuth Configuration
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-Ey7nTKnggBc0bRN8WUjyShw2qzOZ6KW4fUyqcKBePxY=}
      
      # Backend Configuration
      BACKEND_URL: ${BACKEND_URL:-https://be-project-68-backshot.vercel.app}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://be-project-68-backshot.vercel.app}
      
      # Test Credentials (optional, for testing)
      USER_EMAIL: ${USER_EMAIL:-john@notexample.com}
      USER_PASSWORD: ${USER_PASSWORD:-12345678}
      USER2_EMAIL: ${USER2_EMAIL:-dummy@dummy.dummy}
      USER2_PASSWORD: ${USER2_PASSWORD:-12345678}
      
      NODE_ENV: production
    
    restart: unless-stopped
    
    # Optional: Add health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
